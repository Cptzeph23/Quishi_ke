# FILE:    backend/pytest.ini
# PURPOSE: Configure pytest-django so tests find the right settings module

[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files            = tests/test_*.py tests.py *_tests.py
python_classes          = Test*
python_functions        = test_*
addopts                 =
    --reuse-db
    -v
    --tb=short
filterwarnings          =
    ignore::DeprecationWarning